set -g default-shell /bin/zsh

set -g default-terminal "xterm-256color"
set -sg terminal-overrides ",*:RGB"

set-option -g focus-events on

# Change prefix to Ctrl-A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes index from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload config with Prefix-R
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Split in panes using a easier to remember key
bind | split-window -h
bind - split-window -v

set -g history-limit 5000

# VIM mode
setw -g mode-keys vi

# VIM Movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# VIM Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fix ESC delay
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# don't suspend-client
unbind-key C-z

# List of plugins (installed/managed by TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin (v2). Pin the tag so a future upstream rewrite can't break this config.
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'frappe' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style 'rounded'
# Solid frappe base bar (#303446); the plugin evaluates this format lazily via #{E:...}.
set -g @catppuccin_status_background "#{@thm_bg}"

# Status line: empty left, catppuccin window list, app + session + host on the right.
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_host}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
